# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Run release-please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Fetch Release App PEM from Bitwarden
        uses: bitwarden/sm-action@27c0c9dcab679d7250dbab91227c85b49ffa5e0f # v3.0.0
        with:
          access_token: ${{ secrets.BWS_ACCESS_TOKEN }}
          cloud_region: eu
          secrets: |
            3a3459f0-c986-4ff3-a36b-b4550012d41e > KIRCHDEV_RELEASE_APP_PEM

      - name: Mint Release App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: 'Iv23li3hNqtsZ8fDlwqH'
          private-key: ${{ env.KIRCHDEV_RELEASE_APP_PEM }}

      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # When release-please cuts a release, build the provider, GPG-sign the
  # checksums, and attach the artifacts to the release it just created (goreleaser
  # `release.mode: append`). The signed zips + SHA256SUMS + .sig + manifest are
  # what the OpenTofu/Terraform registry consumes.
  goreleaser:
    name: Build and sign provider artifacts
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      # GPG signing key + passphrase live in Bitwarden SM (project: infrastructure),
      # same flow as the Release App PEM above.
      - name: Fetch GPG signing secrets from Bitwarden
        uses: bitwarden/sm-action@27c0c9dcab679d7250dbab91227c85b49ffa5e0f # v3.0.0
        with:
          access_token: ${{ secrets.BWS_ACCESS_TOKEN }}
          cloud_region: eu
          secrets: |
            9112a29e-4a70-4c88-a6a7-b462014541e4 > GPG_PRIVATE_KEY
            aa38c7e5-6d49-4204-a42b-b4620144bcc9 > GPG_PASSPHRASE

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ env.GPG_PRIVATE_KEY }}
          passphrase: ${{ env.GPG_PASSPHRASE }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: '~> v2'
          args: release --clean
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
