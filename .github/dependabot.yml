version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    # Open PRs against the dev branch (the integration branch), not main.
    target-branch: 'dev'
    schedule:
      interval: 'weekly'
    # Mirror the npm `minimumReleaseAge` (3 days): hold updates back until a
    # release has been public for a few days, dodging just-published malicious
    # or broken versions. Applies to every ecosystem below too.
    cooldown:
      default-days: 3
    labels:
      - 'dependencies'
      - 'javascript'
    groups:
      npm-minor-patch:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'github-actions'
    directory: '/'
    target-branch: 'dev'
    schedule:
      interval: 'monthly'
    cooldown:
      default-days: 3
    labels:
      - 'dependencies'
      - 'github-actions'
    groups:
      actions-minor-patch:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
